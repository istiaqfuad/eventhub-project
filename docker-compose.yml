services:
  backend:
    build:
      context: ./eventhub
      dockerfile: Dockerfile
    container_name: eventhub-backend
    environment:
      - SPRING_DATASOURCE_URL=${DATABASE_URL}
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${FRONTEND_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_SUCCESS_URL=${FRONTEND_URL}/booking/success
      - STRIPE_CANCEL_URL=${FRONTEND_URL}/booking/cancel
      - REDIS_HOST=eventhub-redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=eventhub-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./eventhub-frontend
      dockerfile: Dockerfile
    container_name: eventhub-frontend
    environment:
      - BACKEND_URL=http://backend:8080
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    container_name: eventhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dokploy-network
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: eventhub-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - dokploy-network
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

networks:
  dokploy-network:
    external: true

volumes:
  redis-data:
  rabbitmq-data:
