spring.application.name=eventhub

# --- Datasource (matches docker-compose Postgres service) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# --- Flyway owns the schema; Hibernate only validates against it ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Error responses ---
# Handled errors become RFC 9457 problem details via GlobalExceptionHandler.
# These harden the fallback /error path so no internals leak to clients.
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never

# --- Authentication (JWT + refresh cookie) ---
# secret must be Base64 decoding to >=256 bits; no default => app fails fast if unset
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=eventhub
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P30D

# CORS: explicit origins required (allowCredentials=true forbids "*")
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Refresh cookie: secure=false only for local HTTP dev
app.security.cookie.secure=${COOKIE_SECURE:true}
app.security.cookie.refresh-name=refresh_token

# --- Booking holds ---
# How long a PENDING booking holds its seats / GA quota before the sweeper releases it.
app.booking.hold-ttl=PT15M

# --- Stripe (Checkout) ---
# Secrets have no defaults => app fails fast if unset. Use a restricted key (rk_test_...).
app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
app.stripe.currency=${STRIPE_CURRENCY:usd}
app.stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:3000/booking/success}
app.stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/booking/cancel}
# Stripe's minimum Checkout session lifetime is 30 minutes; the booking hold is extended to match on initiate.
app.stripe.checkout-expiry=PT30M

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Rate limiting (requests per minute per user/IP) ---
app.rate-limit.login-per-minute=${RATE_LIMIT_LOGIN:10}
app.rate-limit.booking-per-minute=${RATE_LIMIT_BOOKING:20}
app.rate-limit.payment-per-minute=${RATE_LIMIT_PAYMENT:10}

# --- Waiting room (admission drain rate: users admitted per second) ---
app.waiting-room.drain-per-second=${WAITING_ROOM_DRAIN:10}
app.waiting-room.admission-ttl=PT5M