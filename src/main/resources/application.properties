spring.application.name=eventhub

# --- Datasource (matches docker-compose Postgres service) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# --- Flyway owns the schema; Hibernate only validates against it ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Error responses ---
# Handled errors become RFC 9457 problem details via GlobalExceptionHandler.
# These harden the fallback /error path so no internals leak to clients.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never