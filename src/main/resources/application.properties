spring.application.name=eventhub

# --- Datasource (matches docker-compose Postgres service) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# --- Flyway owns the schema; Hibernate only validates against it ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Error responses ---
# Handled errors become RFC 9457 problem details via GlobalExceptionHandler.
# These harden the fallback /error path so no internals leak to clients.
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never

# --- Authentication (JWT + refresh cookie) ---
# secret must be Base64 decoding to >=256 bits; no default => app fails fast if unset
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=eventhub
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P30D

# CORS: explicit origins required (allowCredentials=true forbids "*")
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Refresh cookie: secure=false only for local HTTP dev
app.security.cookie.secure=${COOKIE_SECURE:true}
app.security.cookie.refresh-name=refresh_token

# --- Booking holds ---
# How long a PENDING booking holds its seats / GA quota before the sweeper releases it.
app.booking.hold-ttl=PT15M